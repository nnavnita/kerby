  T2.4:
    name: Bay parking restrictions integrated (join key resolved)
    status: set_aside
    value: 0.0
    cost: 0.0
    set_aside_reason: 'Empirically confirmed no join key exists between bays (kerbsideid) and restrictions (bayid). Tested overlap of restrictions.bayid vs bays.kerbsideid = 10 / 4263 (0.2%) — random collision, not a real join. Restrictions have no location field so spatial fallback impossible. No parking-signs / parking-meters dataset published to bridge. Historical sensor datasets that used to carry both IDs are retired (empty fields). CoM banner confirms "parking system is being improved" — schema in transition. Options: (a) email CoM open-data team to request a bridge dataset, (b) crowd-source restrictions from users, (c) wait for CoM''s parking-sensor-upgrade project to publish new joined data. Retry T2.4 when any of the above lands.'
    acceptance:
    - Join key between bays (kerbsideid) and restrictions (bayid) resolved — either via CoM contact, an undocumented dataset, or spatial inference from parking-meter locations.
    - Restriction rows re-parsed from CoM's 6-slot structure into normalised (type, days_of_week, start_time, end_time, duration_minutes) rows.
    - Filter drawer exposes shape/duration/type toggles once populated (shape may remain unavailable if CoM never publishes).
    context: 'Blocked at MVP time: CoM restriction dataset uses bayid, sensor + bays dataset use kerbsideid, no join key visible. Dataset docs claim marker_id + bay_id joins that no longer exist in schema. May need to contact City of Melbourne or wait for their ''parking-sensor-upgrade'' data schema improvements.'
    depends_on:
    - T1
    tags:
    - phase-2
    - backend
    - data
    - blocked-external
    origin: manual
    discovered: 2026-07-01
