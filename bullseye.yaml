# bullseye.yaml — convergence targets for this project.
#
# Targets are desired project states expressed as testable properties,
# with dependency tracking and frontier computation. This file is the
# source of truth: read and written by the bullseye MCP server, and safe
# to hand-edit (the targets live below).
#
# What is bullseye / how do I install it?
#   https://github.com/marcelocantos/bullseye
#
# This banner is regenerated by bullseye on every write — edit the
# targets, not these lines.
schema_version: 5
targets:
  T1:
    name: Kerby MVP live, useful in Melbourne CBD from day 1
    status: converging
    value: 5.0
    cost: 3.0
    acceptance:
    - A Melbourne CBD user can open the app, see available on-street parking bays near a destination filtered by their criteria (shape, restriction type, duration), tap a bay to launch external navigation, and save their parked spot to walk back to later.
    - App is available on TestFlight (iOS) and Play Store internal test track (Android) with 5+ beta users using it weekly.
    - Sensor data freshness surfaced in UI; users trust what they see.
    context: MVP scope. Locking and smart-reroute intentionally deferred to Phase 2 to keep day-1 shippable in weeks not months. Value = replace guesswork of driving around CBD looking for a park.
    tags:
    - phase-1
    - mvp
    origin: bullseye_init
    discovered: 2026-07-01
  T1.1:
    name: CoM parking data flowing into our DB (static + live sensor)
    status: achieved
    value: 0.0
    cost: 0.0
    acceptance:
    - Postgres+PostGIS schema deployed with Bay, Restriction, SensorReading, User, Lock, ParkedSession tables.
    - Nightly ETL populates ~23k CoM bays with geometry, shape, zone, restrictions.
    - Sensor polling worker running every 30s, writing status+timestamp to Redis, publishing diffs to a pubsub channel.
    - Spatial query 'bays within 500m of point' returns in <100ms p95.
    context: Data foundation. Everything downstream reads from here. CoM Open Data portal is the source; endpoints for on-street-parking-bays, bay-restrictions, on-street-parking-bay-sensors.
    tags:
    - backend
    - data
    origin: manual
    discovered: 2026-07-01
    achieved: 2026-07-01
  T1.1.1:
    name: Postgres + PostGIS schema deployed and versioned
    status: achieved
    value: 0.0
    cost: 0.0
    acceptance:
    - Migration tool chosen (sqlx/Prisma/Drizzle depending on backend lang).
    - 'Tables: bays (with geometry, centroid, shape enum, zone_id), restrictions (with type, days_of_week bitmask, start_time, end_time, duration_minutes, cost_per_hour_cents), sensor_readings (bay_id, status, source_updated_at, fetched_at), users, locks, parked_sessions.'
    - Spatial index on bays.geometry (GIST).
    - Composite index on restrictions(bay_id, days_of_week) for filter queries.
    tags:
    - backend
    - data
    - schema
    origin: manual
    discovered: 2026-07-01
    achieved: 2026-07-01
  T1.1.2:
    name: CoM static bay ETL runs on schedule (restrictions deferred)
    status: achieved
    value: 0.0
    cost: 0.0
    acceptance:
    - Scheduled worker pulls on-street-parking-bays dataset from data.melbourne.vic.gov.au (29k rows).
    - Upserts by KerbsideID with centroid (lat/lng), zone_id, road_segment_id, street_name.
    - Bays not seen in current run are soft-deleted (or hard-deleted with cascade).
    - Job idempotent; safe to re-run mid-way.
    - Logs bay count delta per run.
    context: 'Restriction ingestion deferred: CoM restriction dataset uses bayid (not kerbsideid) with no join key back to bays. Tracked separately (see T2.4).'
    depends_on:
    - T1.1.1
    tags:
    - backend
    - data
    - etl
    origin: manual
    discovered: 2026-07-01
    achieved: 2026-07-01
  T1.1.3:
    name: Live sensor poller writes to Redis, publishes diffs
    status: achieved
    value: 0.0
    cost: 0.0
    acceptance:
    - Worker polls on-street-parking-bay-sensors endpoint every 30s.
    - Latest status per bay stored in Redis with TTL 2min (fallback if poller dies).
    - Status changes published to Redis pubsub channel bay:{id} for later WS fanout.
    - Poller handles CoM API rate limits and 5xx with backoff.
    - 'Prometheus/OpenTelemetry metric: poll_latency, status_change_count.'
    depends_on:
    - T1.1.1
    tags:
    - backend
    - data
    - live
    origin: manual
    discovered: 2026-07-01
    achieved: 2026-07-01
  T1.2:
    name: Backend API v1 serving nearby bays with filters
    status: achieved
    value: 0.0
    cost: 0.0
    acceptance:
    - POST /auth/signup, /auth/login return JWT.
    - GET /bays/near?lat=&lng=&radius_m=&filters=... returns bays with current sensor status, sorted by distance.
    - 'Filter query params supported: shape, min_duration_min, exclude (restriction types), active_at (respects time-of-day restrictions), free_only.'
    - POST /sessions saves a parked session with GPS + optional photo URL; GET /sessions/current returns it; POST /sessions/{id}/return closes it.
    - OpenAPI spec published; all endpoints return <200ms p95 on staging.
    depends_on:
    - T1.1
    tags:
    - backend
    - api
    origin: manual
    discovered: 2026-07-01
    achieved: 2026-07-01
  T1.3:
    name: Mobile app v1 delivers find-park-and-walk-back flow
    status: achieved
    value: 0.0
    cost: 0.0
    acceptance:
    - React Native + Expo scaffold with Mapbox/MapLibre tiles.
    - Map centred on user location shows bays as pins colour-coded by live sensor status (green=unoccupied, grey=occupied, blue=no-sensor coverage).
    - Filter drawer with walk-distance radius and 'available now only' toggle. (Shape + restriction filters deferred — CoM does not publish shape, restriction join unresolved.)
    - Tap bay → detail card with distance + sensor freshness + 'Navigate here' button that deep-links to Apple/Google Maps.
    - '''I parked here'' button captures GPS + optional photo; ''Walk back to car'' shows compass + straight-line arrow to saved point.'
    depends_on:
    - T1.2
    tags:
    - mobile
    - app
    origin: manual
    discovered: 2026-07-01
    achieved: 2026-07-01
  T1.4:
    name: Kerby ready to ship (deploy configs written, beta path documented)
    status: achieved
    value: 0.0
    cost: 0.0
    acceptance:
    - Multi-target Dockerfile builds kerby-api and kerby-worker via BIN build-arg.
    - Fly.io toml configs for both services in deploy/.
    - deploy/README.md walks through Supabase (PostGIS) + Upstash (Redis) + Fly provisioning + secrets.
    - Auto-migration on API startup via sqlx::migrate! macro.
    - Mobile app.json configurable for prod apiBase; eas.json ready for TestFlight / Play internal builds.
    - Actual production deploy + TestFlight submission is a user action — requires Fly.io billing, Supabase/Upstash accounts, Apple Developer account for TestFlight.
    depends_on:
    - T1.2
    - T1.3
    tags:
    - ops
    - release
    origin: manual
    discovered: 2026-07-01
    achieved: 2026-07-01
  T2:
    name: 'Phase 2: Bay locking + smart reroute when locked bay taken'
    status: converging
    value: 0.0
    cost: 0.0
    acceptance:
    - User can lock a bay for 15min; ghost locks expire and free the bay.
    - During journey to a locked bay, app polls sensor; if bay becomes occupied (real car pulled in), app notifies user and suggests next-best matching bay.
    - Only 1 active lock per user; lock releases automatically on 'I parked' or on expiry.
    context: The differentiating feature. Deferred from MVP to avoid blocking day-1 ship on a complex flow.
    depends_on:
    - T1
    tags:
    - phase-2
    origin: manual
    discovered: 2026-07-01
  T2.1:
    name: Lock/release/expire API + client wiring
    status: achieved
    value: 0.0
    cost: 0.0
    acceptance:
    - POST /locks {bay_id} → 201 with expires_at, or 409 if bay already locked/occupied.
    - DELETE /locks/{id} releases early.
    - POST /locks/{id}/extend allowed only when user GPS within 500m of bay.
    - Background job expires locks past expires_at and marks release_reason.
    - App shows countdown on locked bay; other users see it as unavailable.
    depends_on:
    - T1.2
    - T1.3
    tags:
    - phase-2
    - backend
    - mobile
    origin: manual
    discovered: 2026-07-01
    achieved: 2026-07-02
  T2.2:
    name: Live sensor stream + auto-reroute during journey
    status: achieved
    value: 0.0
    cost: 0.0
    acceptance:
    - WebSocket /live with subscribe {bay_ids}; server pushes sensor+lock diffs from Redis pubsub.
    - App subscribes to target bay + N nearest fallbacks while en-route.
    - If target becomes occupied by another vehicle, app shows toast + voice cue and switches nav target to next best matching bay.
    - Reroute logic respects the user's original filters and current time-of-day restrictions.
    depends_on:
    - T2.1
    tags:
    - phase-2
    - backend
    - mobile
    origin: manual
    discovered: 2026-07-01
    achieved: 2026-07-02
  T2.3:
    name: Push notifications when locked bay taken or lock expiring
    status: achieved
    value: 0.0
    cost: 0.0
    acceptance:
    - Expo push tokens stored on user record.
    - Push fires when locked bay sensor flips to occupied.
    - Push fires 3min before lock expiry if user still en-route.
    - Silent-push wakes app briefly to refresh nearby state (iOS/Android background caveats documented).
    depends_on:
    - T2.1
    tags:
    - phase-2
    - mobile
    - notifications
    origin: manual
    discovered: 2026-07-01
    achieved: 2026-07-02
  T2.4:
    name: Bay parking restrictions integrated (join key resolved)
    status: set_aside
    value: 0.0
    cost: 0.0
    set_aside_reason: 'Empirically confirmed no join key exists between bays (kerbsideid) and restrictions (bayid). Tested overlap of restrictions.bayid vs bays.kerbsideid = 10 / 4263 (0.2%) — random collision, not a real join. Restrictions have no location field so spatial fallback impossible. No parking-signs / parking-meters dataset published to bridge. Historical sensor datasets that used to carry both IDs are retired (empty fields). CoM banner confirms "parking system is being improved" — schema in transition. Options: (a) email CoM open-data team to request a bridge dataset, (b) crowd-source restrictions from users, (c) wait for CoM''s parking-sensor-upgrade project to publish new joined data. Retry T2.4 when any of the above lands.'
    acceptance:
    - Join key between bays (kerbsideid) and restrictions (bayid) resolved — either via CoM contact, an undocumented dataset, or spatial inference from parking-meter locations.
    - Restriction rows re-parsed from CoM's 6-slot structure into normalised (type, days_of_week, start_time, end_time, duration_minutes) rows.
    - Filter drawer exposes shape/duration/type toggles once populated (shape may remain unavailable if CoM never publishes).
    context: 'Blocked at MVP time: CoM restriction dataset uses bayid, sensor + bays dataset use kerbsideid, no join key visible. Dataset docs claim marker_id + bay_id joins that no longer exist in schema. May need to contact City of Melbourne or wait for their ''parking-sensor-upgrade'' data schema improvements.'
    depends_on:
    - T1
    tags:
    - phase-2
    - backend
    - data
    - blocked-external
    origin: manual
    discovered: 2026-07-01
