    name: Postgres advisory locks around ETL jobs
    status: identified
    value: 0.0
    cost: 0.0
    acceptance:
    - Both bay + lot ETL wrap their work in a pg_try_advisory_lock. If another worker holds the lock, the run is skipped with a log line, not queued.
    - Sensor poller does NOT lock (it's idempotent and cheap; letting two run in parallel is harmless).
    - Sweeper does NOT lock (its UPDATE is idempotent under concurrent runs).
